<!DOCTYPE html>
<html lang="en">
  <head>
    {% include head.html %}
  </head>

  <body>


    <header class="site-header">
  <div class="wrapper header-row">

    <div class="header-left">
      <a class="site-title" href="{{ "/" | relative_url }}">
        {{ site.title }}
      </a>

      <button onclick="toggleTheme()" class="theme-toggle" id="theme-toggle-btn">
        🌙 Dark Mode
      </button>
    </div>



    
    <nav class="site-nav custom-nav">
<a class="page-link" href="{{ '/about/' | relative_url }}">About</a>




  <div class="dropdown">
  <a class="page-link dropdown-toggle" href="{{ '/projects/' | relative_url }}">Projects ▾</a>
  <div class="dropdown-content">
    <a href="{{ site.baseurl }}/home-subwoofer/">Home Subwoofer</a>
    <a href="{{ site.baseurl }}/arduino-circuits/">Arduino Circuits</a>
    <a href="{{ site.baseurl }}/ewb-water-filter/">EWB Water Filter</a>
    <a href="{{ site.baseurl }}/catapult-design/">Catapult Design</a>
    <a href="{{ site.baseurl }}/solidworks-practice/">SolidWorks Practice</a>
    <a href="{{ site.baseurl }}/engineering-drawings/">Engineering Drawings</a>
  </div>
</div>





  <a class="page-link" href="{{ '/contact/' | relative_url }}">Contact</a>
</nav>
  </div>



</header>




    <main class="page-content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {% include footer.html %}

 <script>
  function applyTheme() {
    const body = document.body;
    const button = document.getElementById("theme-toggle-btn");
    const savedTheme = localStorage.getItem("theme");

    if (savedTheme === "dark") {
      body.classList.add("dark-mode");
      if (button) button.innerHTML = "☀️ Light Mode";
    } else {
      body.classList.remove("dark-mode");
      if (button) button.innerHTML = "🌙 Dark Mode";
    }
  }

  function toggleTheme() {
    const body = document.body;
    const button = document.getElementById("theme-toggle-btn");

    body.classList.toggle("dark-mode");

    if (body.classList.contains("dark-mode")) {
      localStorage.setItem("theme", "dark");
      if (button) button.innerHTML = "☀️ Light Mode";
    } else {
      localStorage.setItem("theme", "light");
      if (button) button.innerHTML = "🌙 Dark Mode";
    }
  }

  document.addEventListener("DOMContentLoaded", applyTheme);
</script>

  </body>
</html>
